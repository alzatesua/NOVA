# Optimización Avanzada de Nginx 1.29.5 para Alto Tráfico
# Objetivo: <500ms P90, 100+ conexiones simultáneas
# Servidor: 8 CPUs, OpenSSL 3.5.5

# ============================================
# WORKER PROCESSES Y EVENTOS - OPTIMIZADO
# ============================================
worker_processes 8;
worker_rlimit_nofile 65535;
worker_priority -5;  # Mayor prioridad para workers

events {
    worker_connections 8192;  # Aumentado de 4096
    use epoll;
    multi_accept on;
    accept_mutex off;  # Mejor para multi-core
    accept_mutex_delay 50ms;
}

# ============================================
# CONFIGURACIÓN HTTP PRINCIPAL
# ============================================
http {
    # ============================================
    # ZONES PARA LIMITING - AUMENTADAS
    # ============================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=500r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # PROXY CACHE - EXPANDIDO
    # ============================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:20m max_size=200m inactive=60m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=7d use_temp_path=off;

    # ============================================
    # UPSTREAMS - KEEPALIVE OPTIMIZADO CON LOAD BALANCING
    # ============================================
    upstream backend {
        least_conn;
        server backend1:8000 max_fails=3 fail_timeout=30s weight=1;
        server backend2:8000 max_fails=3 fail_timeout=30s weight=1;
        server backend3:8000 max_fails=3 fail_timeout=30s weight=1;

        keepalive 128;  # Aumentado a 128 para 3 backends
        keepalive_timeout 60s;
        keepalive_requests 500;  # Aumentado para mayor throughput
    }

    upstream frontend {
        server frontend:80;
        keepalive 32;
    }

    upstream landing {
        server landing:80;
        keepalive 32;
    }

    # ============================================
    # BUFFERS DEL CLIENTE - OPTIMIZADOS
    # ============================================
    client_body_buffer_size 256k;  # Aumentado de 128k
    client_max_body_size 20m;  # Aumentado de 10m
    client_header_buffer_size 2k;  # Aumentado de 1k
    large_client_header_buffers 8 8k;  # Aumentado de 4 4k

    # ============================================
    # BUFFERS DE PROXY - OPTIMIZADOS
    # ============================================
    proxy_buffering on;
    proxy_buffer_size 8k;  # Aumentado de 4k
    proxy_buffers 16 8k;  # Aumentado de 8 4k
    proxy_busy_buffers_size 16k;  # Aumentado de 8k
    proxy_max_temp_file_size 0;  # Deshabilitar temp files

    # ============================================
    # TIMEOUTS - OPTIMIZADOS PARA ALTA CONCURRENCIA
    # ============================================
    client_body_timeout 10;  # Reducido de 12
    client_header_timeout 10;  # Reducido de 12
    keepalive_timeout 75;  # Aumentado de 65
    send_timeout 10;
    keepalive_requests 200;  # Aumentado

    # ============================================
    # TIMEOUTS DE PROXY - OPTIMIZADOS
    # ============================================
    proxy_connect_timeout 20;  # Reducido de 30
    proxy_send_timeout 20;  # Reducido de 30
    proxy_read_timeout 30;  # Mantenido
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    proxy_next_upstream_tries 2;

    # ============================================
    # COMPRESIÓN GZIP - OPTIMIZADA
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 128;  # Reducido de 256
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml
        text/x-cross-domain-policy;

    # Brotli si está disponible (requiere módulo)
    # gzip_static on;

    # ============================================
    # OPTIMIZACIÓN SSL/TLS - AVANZADA
    # ============================================
    # Session cache - AUMENTADO
    ssl_session_cache shared:SSL:50m;  # Aumentado de 10m (~400k sesiones)
    ssl_session_timeout 1d;  # Aumentado de 10m
    ssl_session_tickets on;  # Seguridad mejorada

    # Protocolos y cifrados - TLS 1.3 optimizado
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Buffer size optimizado para TLS 1.3
    ssl_buffer_size 4k;  # Reducido de 16k por defecto

    # OCSP stapling - reduce latencia SSL
    ssl_stapling on;
    ssl_stapling_verify on;
    # ssl_stapling_file /etc/ssl/certs/chain.pem; # File not available
    # ssl_trusted_certificate /etc/ssl/certs/chain.pem; # File not available
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Early data para TLS 1.3 (0-RTT)
    ssl_early_data off;

    # ============================================
    # LOGGING OPTIMIZADO CON MÉTRICAS
    # ============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'cache=$upstream_cache_status '
                    'ssl=$ssl_protocol/$ssl_cipher';

    log_format detailed '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time ut=$upstream_response_time '
                       'cs=$upstream_cache_status '
                       'hc=$upstream_http_content_type';

    access_log /var/log/nginx/access.log main buffer=64k flush=3s;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # HEADERS DE PROXY POR DEFECTO
    # ============================================
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Headers de seguridad y optimización
    proxy_set_header X-Content-Type-Options nosniff;
    proxy_set_header X-Frame-Options DENY;
    proxy_set_header X-XSS-Protection "1; mode=block";

    # ============================================
    # HIDE SERVER VERSION
    # ============================================
    server_tokens off;
    # more_clear_headers Server; # Requires headers-more module

    # ============================================
    # RATE LIMITING GLOBAL
    # ============================================
    limit_req_status 429;
    limit_conn_status 429;

    # ============================================
    # SERVER BLOCK PARA dagi.co (landing) - HTTP
    # ============================================
    server {
        listen 80;
        server_name dagi.co;

        # Permitir validación de certbot ANTES del redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # SERVER BLOCK PARA nova.dagi.co y www - HTTP
    # ============================================
    server {
        listen 80;
        server_name nova.dagi.co www.nova.dagi.co;

        # Permitir validación de certbot ANTES del redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # SERVER BLOCK PARA dagi.co (landing) - HTTPS
    # ============================================
    server {
        listen 443 ssl;
    http2 on;
        server_name dagi.co;

        # SSL certificates
        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        # SSL optimizado
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        location / {
            proxy_pass http://landing;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============================================
    # SERVER BLOCK PARA nova.dagi.co - HTTPS OPTIMIZADO
    # ============================================
    server {
        listen 443 ssl;
    http2 on;
        server_name nova.dagi.co www.nova.dagi.co;

        # SSL certificates
        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        # SSL optimizado para TLS 1.3
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_early_data off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ============================================
        # MONITOREO DE NGINX STATUS
        # ============================================
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            deny all;
        }

        # ============================================
        # FRONTEND (REACT) CON CACHE
        # ============================================
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Cache de frontend
            proxy_cache static_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating;

            # Rate limiting
            
            limit_req zone=api_limit burst=500 nodelay;
            limit_conn conn_limit 50;
        }

        # ============================================
        # API BACKEND (DJANGO) CON CACHING Y KEEPALIVE
        # ============================================
        location /api/ {
            # CORS OPTIONS
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE, PATCH" always;
                add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Max-Age 3600;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Proxy cache agresivo para API
            proxy_cache api_cache;
            proxy_cache_valid 200 302 2m;  # Aumentado de 1m
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;

            # Bypass de cache para métodos no seguros
            proxy_cache_methods GET HEAD;

            # Rate limiting aumentado
            
            limit_req zone=api_limit burst=500 nodelay;
            limit_conn conn_limit 50;

            # Proxy con keepalive
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Headers de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Headers de cache en respuesta
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # ============================================
        # ADMIN DJANGO
        # ============================================
        location /admin/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Sin cache para admin
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ============================================
        # ARCHIVOS ESTÁTICOS CON CACHE MUY LARGO
        # ============================================
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
            proxy_pass http://frontend;
            proxy_cache static_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_use_stale error timeout updating;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;

            # CORS para fuentes
            location ~* \.(woff|woff2|ttf|eot)$ {
                add_header Access-Control-Allow-Origin *;
            }
        }

        # ============================================
        # STATIC FILES
        # ============================================
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public";

            # Cache de archivos estáticos
            location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # ============================================
        # MEDIA FILES
        # ============================================
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # ============================================
    # SERVER BLOCK PARA otros subdominios - HTTPS
    # ============================================
    server {
        listen 443 ssl;
    http2 on;
        server_name *.nova.dagi.co;

        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/private/privkey.pem;

        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_early_data off;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_cache static_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_use_stale error timeout updating;

            
            limit_req zone=api_limit burst=500 nodelay;
            limit_conn conn_limit 50;
        }

        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE, PATCH" always;
                add_header Access-Control-Allow-Headers "Authorization,Content-Type,Accept" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            proxy_cache api_cache;
            proxy_cache_valid 200 302 2m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating;

            
            limit_req zone=api_limit burst=500 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /admin/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }
    }
}
