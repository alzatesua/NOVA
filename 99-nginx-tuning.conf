# Optimizaciones del Kernel Linux para Nginx de Alto Rendimiento
# Archivo: /etc/sysctl.d/99-nginx-tuning.conf
# Aplicar con: sudo sysctl -p /etc/sysctl.d/99-nginx-tuning.conf

# ============================================
# OPTIMIZACIONES DE RED - CONEXIONES TCP
# ============================================

# Reducir tiempo de espera para conexiones en cierre
net.ipv4.tcp_fin_timeout = 30

# Reutilizar conexiones en TIME_WAIT
net.ipv4.tcp_tw_reuse = 1

# Habilitar TCP Fast Open (TFO) para reducir latencia
net.ipv4.tcp_fastopen = 3

# Aumentar backlog de conexiones pendientes
net.ipv4.tcp_max_syn_backlog = 8192

# Aumentar longitud de cola de escucha
net.core.somaxconn = 8192

# ============================================
# BUFFERS DE RED
# ============================================

# Buffer de lectura TCP (aumentado)
net.ipv4.tcp_rmem = 4096 87380 16777216

# Buffer de escritura TCP (aumentado)
net.ipv4.tcp_wmem = 4096 65536 16777216

# Tamaño máximo de buffer de lectura
net.core.rmem_max = 16777216

# Tamaño máximo de buffer de escritura
net.core.wmem_max = 16777216

# Buffer de datagramas
net.core.rmem_default = 262144
net.core.wmem_default = 262144

# ============================================
# OPTIMIZACIONES DE CONEXIONES
# ============================================

# Aumentar número de conexiones disponibles
net.ipv4.ip_local_port_range = 1024 65535

# Reducir tiempo de keepalive probes
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 3

# Habilitar window scaling para alto throughput
net.ipv4.tcp_window_scaling = 1

# Habilitar selective ACK
net.ipv4.tcp_sack = 1

# Deshabilitar slow-start después de idle
net.ipv4.tcp_slow_start_after_idle = 0

# ============================================
# PROTECCIONES Y LÍMITES
# ============================================

# Protección contra SYN flood
net.ipv4.tcp_syncookies = 1

# Aumentar límite de conexiones en SYN_RECV
net.ipv4.tcp_max_syn_backlog = 8192

# ============================================
# GESTIÓN DE ARCHIVOS
# ============================================

# Aumentar límite de file descriptors
fs.file-max = 2097152

# ============================================
# OPTIMIZACIONES DE SWAP Y MEMORIA
# ============================================

# Reducir swappiness (preferir RAM sobre swap)
vm.swappiness = 10

# Aumentar ratio de dirty pages
vm.dirty_ratio = 15
vm.dirty_background_ratio = 3

# ============================================
# OPTIMIZACIONES PARA CONTENEDORES
# ============================================

# Aumentar límites de claves de ruta
net.ipv4.neigh.default.gc_thresh1 = 4096
net.ipv4.neigh.default.gc_thresh2 = 8192
net.ipv4.neigh.default.gc_thresh3 = 16384

# ============================================
# IPv6 (si está habilitado)
# ============================================

# Optimizaciones similares para IPv6
net.ipv6.conf.all.forwarding = 0
