
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bd_madre
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zuleta18
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nova_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: nova-redis-1
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly no
    volumes:
      - redis_data:/data
    networks:
      - nova_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  backend1:
    build: ./backend
    container_name: nova-backend-1
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    networks:
      - nova_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  backend2:
    build: ./backend
    container_name: nova-backend-2
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    networks:
      - nova_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  backend3:
    build: ./backend
    container_name: nova-backend-3
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    networks:
      - nova_network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  frontend:
    build: ./frontend
    container_name: nova-frontend-1
    networks:
      - nova_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  nginx:
    build: ./nginx
    container_name: nova-nginx-1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend1
      - backend2
      - backend3
      - frontend
    volumes:
      - staticfiles:/app/static/
      - ./backend/media:/app/media/
      - /etc/letsencrypt/live/nova.dagi.co/fullchain.pem:/etc/ssl/certs/fullchain.pem
      - /etc/letsencrypt/live/nova.dagi.co/privkey.pem:/etc/ssl/private/privkey.pem
      - /var/www/certbot:/var/www/certbot
    networks:
      - nova_network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 256M

volumes:
  postgres_data:
  staticfiles:
  redis_data:

networks:
  nova_network:
    driver: bridge
